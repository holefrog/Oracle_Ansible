---
- name: Create sentinel base directory (root, then hand off)
  tags: [hugo, deploy]
  ansible.builtin.file:
    path: "{{ sentinel_path }}"
    state: directory
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0755"
  become: true

- name: Create Hugo site directory
  tags: [hugo, deploy]
  ansible.builtin.file:
    path: "{{ sentinel_path }}/hugo"
    state: directory
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0755"
  become: true

- name: Create Hugo content subdirectories
  tags: [hugo, deploy]
  ansible.builtin.file:
    path: "{{ sentinel_path }}/hugo/{{ item }}"
    state: directory
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0755"
  loop:
    - content/news/archives
    - content/reports/archives
    - layouts/_default
    - static/css
  become: true
  become_user: "{{ sentinel_user }}"

- name: Create webroot directory for Hugo output
  tags: [hugo, deploy]
  ansible.builtin.file:
    path: "{{ web_base }}/{{ domain }}{% if sentinel_prefix %}/{{ sentinel_prefix }}{% endif %}"
    state: directory
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0755"
  become: true
