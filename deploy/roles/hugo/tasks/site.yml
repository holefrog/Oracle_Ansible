---
- name: Deploy Hugo site config (rendered template)
  tags: [hugo, deploy]
  ansible.builtin.template:
    src: hugo.toml.j2
    dest: "{{ sentinel_path }}/hugo/hugo.toml"
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0644"
  become: true
  become_user: "{{ sentinel_user }}"

- name: Deploy layouts
  tags: [hugo, deploy]
  ansible.builtin.copy:
    src: layouts/
    dest: "{{ sentinel_path }}/hugo/layouts/"
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0644"
  become: true
  become_user: "{{ sentinel_user }}"

- name: Deploy static assets
  tags: [hugo, deploy]
  ansible.builtin.copy:
    src: static/
    dest: "{{ sentinel_path }}/hugo/static/"
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0644"
  become: true
  become_user: "{{ sentinel_user }}"

- name: Deploy content skeleton
  tags: [hugo, deploy]
  ansible.builtin.copy:
    src: content/
    dest: "{{ sentinel_path }}/hugo/content/"
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0644"
  become: true
  become_user: "{{ sentinel_user }}"
