# ── 2. 主题与目录结构初始化 ───────────────────────────────
- name: Initialize Hugo project skeleton
  tags: [hugo, deploy]
  ansible.builtin.command:
    cmd: "{{ hugo_path }} new site {{ sentinel_path }}/hugo --force"
    creates: "{{ sentinel_path }}/hugo/hugo.toml"
  become: true  # 确保这里使用的是小写的 true

- name: Force Sync PaperMod Theme (Master Branch)
  tags: [hugo, deploy]
  ansible.builtin.git:
    repo: https://github.com/adityatelange/hugo-PaperMod
    dest: "{{ sentinel_path }}/hugo/themes/PaperMod"
    version: "master"
    depth: 1
    update: true
    force: true
    # 移除 owner 和 group，git 模块不支持这些参数
  become: true

- name: Ensure PaperMod theme ownership
  tags: [hugo, deploy]
  ansible.builtin.file:
    path: "{{ sentinel_path }}/hugo/themes/PaperMod"
    state: directory
    owner: ubuntu
    group: ubuntu
    recurse: true
  become: true
