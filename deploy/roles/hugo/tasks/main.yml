# ── 2. 主题与目录结构初始化 ───────────────────────────────
- name: Initialize Hugo project skeleton
  tags: [hugo, deploy]
  ansible.builtin.command:
    cmd: "{{ hugo_path }} new site {{ sentinel_path }}/hugo --force"
    creates: "{{ sentinel_path }}/hugo/hugo.toml"
  become: true
  become_user: ubuntu  # 修正：由 ubuntu 创建源码目录

- name: Force Sync PaperMod Theme (Master Branch)
  tags: [hugo, deploy]
  ansible.builtin.git:
    repo: https://github.com/adityatelange/hugo-PaperMod
    dest: "{{ sentinel_path }}/hugo/themes/PaperMod"
    version: "master"
    depth: 1
    update: true
    force: true
  become: true
  become_user: ubuntu  # 修正：不再直接在 git 模块内写 owner，而是切换执行用户

- name: Remove competing Hugo config files (yaml/json)
  tags: [hugo, deploy]
  ansible.builtin.file:
    path: "{{ sentinel_path }}/hugo/{{ item }}"
    state: absent
  become: true
  loop:
    - "hugo.yaml"
    - "hugo.json"
    - "config.yaml"
    - "config.json"
