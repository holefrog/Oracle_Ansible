---
# hugo/tasks/main.yml
# v2 - 拆分为功能子文件

- name: Create Hugo directories
  ansible.builtin.import_tasks: dirs.yml

- name: Install Hugo theme
  ansible.builtin.import_tasks: theme.yml

- name: Deploy Hugo site skeleton
  ansible.builtin.import_tasks: site.yml

- name: Deploy Hugo build script
  ansible.builtin.import_tasks: build.yml
