---
- name: Generate sentinel SSH keypair on localhost
  tags: [app_user]
  community.crypto.openssh_keypair:
    path: "{{ playbook_dir }}/sentinel.key"
    type: rsa
    size: 4096
    state: present
  delegate_to: localhost
  become: false

- name: Read sentinel public key
  tags: [app_user]
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/sentinel.key.pub"
  register: sentinel_pubkey
  delegate_to: localhost
  become: false

- name: Create app user account
  tags: [app_user]
  ansible.builtin.user:
    name: "{{ app_user_name }}"
    system: true
    shell: "{{ app_user_shell }}"
    home: "{{ app_user_home }}"
    create_home: true
    state: present

- name: Ensure .ssh directory exists for app user
  tags: [app_user]
  ansible.builtin.file:
    path: "{{ app_user_home }}/.ssh"
    state: directory
    owner: "{{ app_user_name }}"
    group: "{{ app_user_name }}"
    mode: "0700"

- name: Write sentinel public key to authorized_keys
  tags: [app_user]
  ansible.builtin.copy:
    content: "{{ sentinel_pubkey.content | b64decode }}"
    dest: "{{ app_user_home }}/.ssh/authorized_keys"
    owner: "{{ app_user_name }}"
    group: "{{ app_user_name }}"
    mode: "0600"

- name: Configure sudoers for app user
  tags: [app_user]
  ansible.builtin.template:
    src: sudoers.j2
    dest: "/etc/sudoers.d/{{ app_user_name }}"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
