---
- name: Install Nginx and Certbot
  ansible.builtin.apt:
    name: [nginx, certbot, python3-certbot-nginx]
    state: present
    update_cache: true

- name: Ensure Certbot webroot challenge directory exists
  ansible.builtin.file:
    path: /var/www/certbot
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Check if SSL certificate exists
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
  register: ssl_cert

- name: Handle initial SSL certificate request
  when: not ssl_cert.stat.exists
  block:
    - name: Deploy minimal HTTP-only Nginx configuration for ACME challenge
      ansible.builtin.template:
        src: nginx-http.conf.j2
        dest: "/etc/nginx/conf.d/{{ domain }}.conf"
        mode: '0644'

    - name: Restart Nginx to load HTTP config for challenge
      ansible.builtin.systemd:
        name: nginx
        state: restarted
        enabled: true

    - name: Request Let's Encrypt Certificate
      ansible.builtin.command: >
        certbot certonly --webroot -w /var/www/certbot
        -d {{ domain }}
        --non-interactive --agree-tos -m admin@{{ domain }}
      changed_when: true
      notify: Reload Nginx

- name: Deploy full Nginx configuration
  ansible.builtin.template:
    src: nginx-full.conf.j2
    dest: "/etc/nginx/conf.d/{{ domain }}.conf"
    mode: '0644'
  notify: Reload Nginx

- name: Ensure Nginx is running and enabled
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started

- name: Enable Certbot automatic renewal timer
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started
