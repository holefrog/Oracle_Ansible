- name: Create agent application directory
  tags: [deploy]
  ansible.builtin.file:
    path: "{{ app_user_home }}/agent"
    state: directory
    owner: "{{ app_user_name }}"
    group: "{{ app_user_name }}"
    mode: "0755"
  become: true

- name: Create agent config directory
  tags: [deploy]
  ansible.builtin.file:
    path: "{{ app_user_home }}/config"
    state: directory
    owner: "{{ app_user_name }}"
    group: "{{ app_user_name }}"
    mode: "0755"
  become: true

- name: Create agent logs directory
  tags: [deploy]
  ansible.builtin.file:
    path: "{{ app_user_home }}/logs"
    state: directory
    owner: "{{ app_user_name }}"
    group: "{{ app_user_name }}"
    mode: "0755"
  become: true

- name: Create data directory as sentinel user
  tags: [deploy]
  ansible.builtin.file:
    path: "{{ app_user_home }}/data"
    state: directory
    owner: "{{ app_user_name }}"
    group: "{{ app_user_name }}"
    mode: "0755"
  become: true

- name: Create Python virtual environment and install dependencies
  tags: [deploy]
  ansible.builtin.pip:
    requirements: "{{ app_user_home }}/agent/requirements.txt"
    virtualenv: "{{ app_user_home }}/venv"
    virtualenv_command: python3 -m venv
    extra_args: "--upgrade pip"
  become: true
  become_user: "{{ app_user_name }}"

- name: Fix venv directory ownership
  tags: [deploy]
  ansible.builtin.file:
    path: "{{ app_user_home }}/venv"
    state: directory
    owner: "{{ app_user_name }}"
    group: "{{ app_user_name }}"
    recurse: true
  become: true
