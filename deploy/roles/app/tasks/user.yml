---
- name: Create sentinel service account
  tags: [deploy]
  ansible.builtin.user:
    name: "{{ app_user_name }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ app_user_home }}"
    create_home: false
    state: present

- name: Ensure app_user_home root is owned by sentinel
  tags: [deploy]
  ansible.builtin.file:
    path: "{{ app_user_home }}"
    state: directory
    owner: "{{ app_user_name }}"
    group: "{{ app_user_name }}"
    mode: "0755"
  become: true
