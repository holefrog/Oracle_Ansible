---
- name: Create sentinel service account
  tags: [deploy]
  ansible.builtin.user:
    name: "{{ sentinel_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ sentinel_path }}"
    create_home: false
    state: present

- name: Ensure sentinel_path root is owned by sentinel
  tags: [deploy]
  ansible.builtin.file:
    path: "{{ sentinel_path }}"
    state: directory
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0755"
  become: true
