---
- name: Create sentinel application root directory
  ansible.builtin.file:
    path: "{{ sentinel_path }}"
    state: directory
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0755"
  become: true

- name: Create sentinel application subdirectories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0755"
  loop:
    - "{{ sentinel_path }}/agent"
    - "{{ sentinel_path }}/config"
    - "{{ sentinel_path }}/logs"
    - "{{ sentinel_path }}/hugo"
    - "{{ sentinel_path }}/hugo/content/news/archives"
    - "{{ sentinel_path }}/hugo/content/reports/archives"
    - "{{ sentinel_path }}/hugo/layouts/_default"
    - "{{ sentinel_path }}/hugo/static/css"
    - "{{ web_base }}/{{ domain }}{% if sentinel_prefix %}/{{ sentinel_prefix }}{% endif %}"
  become: true
