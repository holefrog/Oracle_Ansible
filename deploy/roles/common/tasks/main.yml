---
# common/tasks/main.yml — VPS 环境初始化（Ubuntu 兼容版）

- name: Print VPS basic runtime information
  tags: [check, always]
  block:
    - name: Execute system status query commands
      ansible.builtin.shell: free -h && df -h / && uptime
      register: info
      changed_when: false

    - name: Output memory, disk and load results
      ansible.builtin.debug:
        msg: "{{ info.stdout_lines }}"

- name: Configure 1GB Swap partition if not exists
  tags: [check, swap]
  block:
    - name: Check if system has Swap enabled
      ansible.builtin.command: swapon --show=SIZE --noheadings
      register: swap_check
      changed_when: false

    - name: Create swap file /swapfile
      ansible.builtin.command: fallocate -l 1G /swapfile
      when: swap_check.stdout == ""
      changed_when: true

    - name: Set swap file permissions
      ansible.builtin.file:
        path: /swapfile
        mode: "0600"
      when: swap_check.stdout == ""

    - name: Format as swap partition
      ansible.builtin.command: mkswap /swapfile
      when: swap_check.stdout == ""
      changed_when: true

    - name: Enable swap partition immediately
      ansible.builtin.command: swapon /swapfile
      when: swap_check.stdout == ""
      changed_when: true

    - name: Persist Swap configuration in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

- name: Update apt cache and install Python 3 runtime
  tags: [check]
  ansible.builtin.apt:
    name: [python3, python3-pip]
    state: present
    update_cache: true

- name: Install basic maintenance tools
  tags: [check, firewall]
  ansible.builtin.apt:
    name: [git, rsync, cron, curl, ufw]
    state: present

- name: Verify ufw executable exists
  tags: [check, firewall]
  ansible.builtin.stat:
    path: /usr/sbin/ufw
  register: ufw_exec
  changed_when: false

- name: Reinstall ufw if executable is missing
  tags: [check, firewall]
  ansible.builtin.shell: |
    set -euo pipefail
    apt-get update -y
    apt-get install --reinstall -y ufw
  when: not ufw_exec.stat.exists
  changed_when: true

- name: Ensure cron service is running (Ubuntu name is 'cron')
  tags: [check]
  ansible.builtin.systemd:
    name: cron
    enabled: true
    state: started

- name: Allow HTTP and HTTPS traffic for Certbot challenge
  tags: [check, firewall]
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: [80, 443]

- name: Ensure UFW is enabled
  tags: [check, firewall]
  community.general.ufw:
    state: enabled
    policy: allow

- name: Deploy ChangeIP DDNS script from template
  tags: [ddns]
  ansible.builtin.template:
    src: changeip.sh.j2
    dest: /usr/local/bin/changeip.sh
    mode: '0755'

- name: Setup Cron job for ChangeIP DDNS Update
  tags: [ddns]
  ansible.builtin.cron:
    name: "Update ChangeIP DDNS"
    minute: "*/10"
    job: "/usr/local/bin/changeip.sh"
