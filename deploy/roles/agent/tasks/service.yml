---
- name: Generate .env configuration
  tags: [deploy, secrets]
  ansible.builtin.template:
    src: env.j2
    dest: "{{ sentinel_path }}/.env"
    mode: "0600"
  notify: Restart bot

- name: Deploy Systemd service unit
  tags: [deploy]
  ansible.builtin.template:
    src: bot.service.j2
    dest: "/etc/systemd/system/{{ service_name }}.service"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart bot

- name: Ensure Discord Bot service is running
  tags: [deploy]
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    enabled: true
    state: started
    daemon_reload: true
