- name: Ensure sentinel_path ownership is correct
  tags: [deploy]
  ansible.builtin.file:
    path: "{{ sentinel_path }}"
    state: directory
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    recurse: yes
  become: true

- name: Create sentinel logs directory
  tags: [deploy]
  ansible.builtin.file:
    path: "{{ sentinel_path }}/logs"
    state: directory
    owner: "{{ sentinel_user }}"
    group: "{{ sentinel_user }}"
    mode: "0755"
  become: true

- name: Create Python virtual environment and install dependencies
  tags: [deploy]
  ansible.builtin.pip:
    requirements: "{{ sentinel_path }}/agent/requirements.txt"
    virtualenv: "{{ sentinel_path }}/venv"
    virtualenv_command: python3 -m venv
    extra_args: "--upgrade pip"
  become: true
  become_user: "{{ sentinel_user }}"
