---
# common/tasks/main.yml — VPS 环境初始化（Ubuntu ARM 兼容版）

- name: Print VPS basic runtime information
  tags: [check, always]
  block:
    - name: Execute system status query commands
      ansible.builtin.shell: free -h && df -h / && uptime
      register: info
      changed_when: false

    - name: Output memory, disk and load results
      ansible.builtin.debug:
        msg: "{{ info.stdout_lines }}"

- name: Configure 1GB Swap partition if not exists
  tags: [check, swap]
  block:
    - name: Check if system has Swap enabled
      ansible.builtin.command: swapon --show=SIZE --noheadings
      register: swap_check
      changed_when: false

    - name: Create swap file /swapfile
      ansible.builtin.command: fallocate -l 1G /swapfile
      when: swap_check.stdout == ""
      changed_when: true

    - name: Set swap file permissions
      ansible.builtin.file:
        path: /swapfile
        mode: "0600"
      when: swap_check.stdout == ""

    - name: Format as swap partition
      ansible.builtin.command: mkswap /swapfile
      when: swap_check.stdout == ""
      changed_when: true

    - name: Enable swap partition immediately
      ansible.builtin.command: swapon /swapfile
      when: swap_check.stdout == ""
      changed_when: true

    - name: Persist Swap configuration in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

- name: Update apt cache and install Python 3 runtime
  tags: [check]
  ansible.builtin.apt:
    name: [python3, python3-pip, python3-venv]
    state: present
    update_cache: true

- name: Install basic maintenance tools
  tags: [check]
  ansible.builtin.apt:
    name: [git, rsync, cron, curl, ufw, iptables-persistent]
    state: present

- name: Ensure cron service is running
  tags: [check]
  ansible.builtin.systemd:
    name: cron
    enabled: true
    state: started

- name: Flush OCI default iptables to allow UFW management
  tags: [check, firewall]
  ansible.builtin.shell: |
    iptables -F
    iptables -X
    iptables -P INPUT ACCEPT
    iptables -P FORWARD ACCEPT
    iptables -P OUTPUT ACCEPT
    netfilter-persistent save
  changed_when: true

- name: Diagnose ufw executable presence and permissions
  tags: [check, firewall]
  block:
    - name: Check common ufw paths
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /usr/sbin/ufw
        - /usr/bin/ufw
        - /sbin/ufw
        - /bin/ufw
      register: ufw_stats
      changed_when: false

    - name: Resolve ufw in PATH (command -v)
      ansible.builtin.command: which ufw
      register: ufw_command_v
      changed_when: false
      failed_when: false

    - name: Show ufw diagnostics
      ansible.builtin.debug:
        msg:
          - "which ufw => {{ ufw_command_v.stdout | default('') }}"
          - "stat results => {{ ufw_stats.results | map(attribute='stat') | list }}"

- name: Reinstall ufw if executable is missing (agent safety net)
  tags: [check, firewall]
  ansible.builtin.apt:
    name: ufw
    state: latest
    update_cache: true
    force_apt_get: true
  when: ufw_stats.results | map(attribute='stat.exists') | select('equalto', true) | list | length == 0

- name: Allow HTTP, HTTPS and SSH traffic
  tags: [check, firewall]
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: [22, 80, 443]

- name: Ensure UFW is enabled
  tags: [check, firewall]
  community.general.ufw:
    state: enabled
    policy: deny

- name: Deploy ChangeIP DDNS script
  tags: [ddns]
  ansible.builtin.template:
    src: changeip.sh.j2
    dest: /usr/local/bin/changeip.sh
    mode: '0755'

- name: Setup Cron job for DDNS
  tags: [ddns]
  ansible.builtin.cron:
    name: "Update ChangeIP DDNS"
    minute: "*/10"
    job: "/usr/local/bin/changeip.sh"
